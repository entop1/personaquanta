<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PersonaQuanta · CRM</title>
<style>
:root{--bg:#06090F;--card:#0D1825;--card2:#111E2D;--card3:#0A1218;--border:#1E3048;--accent:#2AA7FF;--accent2:#00D9AE;--accent3:#FFB547;--red:#FF4757;--text:#E8EEFF;--muted:#7A9AB8;--muted2:#3A5470}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column}
.topbar{display:flex;align-items:center;gap:12px;padding:10px 20px;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--card3)}
.logo{font-weight:700;font-size:14px}.logo span{color:var(--accent)}
.topbar-meta{font-size:10px;color:var(--muted2);font-family:monospace}
.topbar-right{margin-left:auto;display:flex;gap:8px}
.tbtn{font-size:11px;font-family:monospace;padding:5px 12px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all .15s}
.tbtn:hover{border-color:var(--accent);color:var(--accent)}
.tbtn.primary{border-color:rgba(0,217,174,.35);color:var(--accent2);background:rgba(0,217,174,.08)}
.layout{display:flex;flex:1;overflow:hidden}
.sidebar{width:240px;flex-shrink:0;border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;background:var(--card3)}
.sidebar-stats{padding:10px 12px;border-bottom:1px solid var(--border);display:grid;grid-template-columns:1fr 1fr;gap:5px}
.sstat{background:var(--card);border:1px solid var(--border);border-radius:7px;padding:7px 9px}
.sstat-val{font-size:18px;font-weight:700;line-height:1}
.sstat-lbl{font-size:9px;color:var(--muted2);font-family:monospace;margin-top:2px}
.search-wrap{padding:7px 10px;border-bottom:1px solid var(--border)}
.search-wrap input{width:100%;background:var(--card);border:1px solid var(--border);color:var(--text);font-size:12px;padding:6px 9px;border-radius:6px;outline:none}
.search-wrap input:focus{border-color:var(--accent)}
.search-wrap input::placeholder{color:var(--muted2)}
.sidebar-filters{padding:7px 9px;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:2px}
.fb{font-size:11px;font-family:monospace;padding:5px 8px;border-radius:5px;border:1px solid transparent;background:transparent;color:var(--muted);cursor:pointer;text-align:left;display:flex;justify-content:space-between}
.fb:hover{background:var(--card);color:var(--text)}
.fb.active{background:rgba(42,167,255,.1);border-color:rgba(42,167,255,.2);color:var(--accent)}
.fc{font-size:9px;opacity:.55}
.contact-list{flex:1;overflow-y:auto;padding:5px}
.ci{padding:8px 9px;border-radius:7px;cursor:pointer;margin-bottom:2px;border:1px solid transparent}
.ci:hover{background:var(--card);border-color:var(--border)}
.ci.sel{background:rgba(42,167,255,.07);border-color:rgba(42,167,255,.25)}
.ci-name{font-size:12px;font-weight:600;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ci-co{font-size:10px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ci-bot{display:flex;align-items:center;justify-content:space-between;margin-top:3px}
.ci-date{font-size:9px;color:var(--muted2);font-family:monospace}
.badge{display:inline-block;font-size:9px;font-family:monospace;padding:2px 6px;border-radius:20px;font-weight:600}
.b-new{background:rgba(0,217,174,.12);color:var(--accent2);border:1px solid rgba(0,217,174,.2)}
.b-sent{background:rgba(42,167,255,.12);color:var(--accent);border:1px solid rgba(42,167,255,.2)}
.b-replied{background:rgba(0,217,174,.12);color:var(--accent2);border:1px solid rgba(0,217,174,.2)}
.b-hot{background:rgba(255,181,71,.15);color:var(--accent3);border:1px solid rgba(255,181,71,.25)}
.b-declined{background:rgba(255,71,87,.1);color:var(--red);border:1px solid rgba(255,71,87,.2)}
.b-followup{background:rgba(140,160,255,.1);color:#8CA0FF;border:1px solid rgba(140,160,255,.2)}
.b-closed{background:rgba(58,84,112,.2);color:var(--muted2);border:1px solid var(--border)}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.main-empty{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;color:var(--muted2)}
.main-empty .ico{font-size:32px;opacity:.2}
.paste-panel{flex:1;display:flex;flex-direction:column;padding:24px;gap:16px;overflow-y:auto;max-width:800px;width:100%}
.paste-title{font-size:16px;font-weight:700}
.paste-sub{font-size:12px;color:var(--muted)}
.paste-area{width:100%;min-height:180px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;font-size:12px;color:var(--text);font-family:inherit;outline:none;resize:vertical;line-height:1.6}
.paste-area:focus{border-color:var(--accent2)}
.paste-area::placeholder{color:var(--muted2)}
.btn-analyze{padding:11px 20px;background:rgba(0,217,174,.12);border:1px solid rgba(0,217,174,.3);color:var(--accent2);font-size:13px;font-weight:700;font-family:monospace;border-radius:8px;cursor:pointer;display:flex;align-items:center;gap:8px;justify-content:center}
.btn-analyze:hover{background:rgba(0,217,174,.2)}
.btn-analyze:disabled{opacity:.4;cursor:not-allowed}
.analysis-note{font-size:11px;color:var(--muted2);padding:10px 12px;background:var(--card);border:1px solid var(--border);border-radius:7px;line-height:1.6}
.results-panel{flex:1;display:flex;flex-direction:column;overflow:hidden}
.rp-header{padding:16px 20px;border-bottom:1px solid var(--border);flex-shrink:0;display:flex;align-items:flex-start;gap:16px}
.rp-name{font-size:18px;font-weight:700}
.rp-co{font-size:12px;color:var(--muted);margin-top:2px}
.rp-fit{font-size:11px;font-family:monospace;padding:3px 10px;border-radius:20px;background:rgba(255,181,71,.12);color:var(--accent3);border:1px solid rgba(255,181,71,.25);white-space:nowrap;margin-top:2px;display:inline-block}
.rp-meta{margin-left:auto;display:flex;flex-direction:column;align-items:flex-end;gap:6px}
.rp-body{display:flex;flex:1;overflow:hidden}
.rp-left{width:280px;flex-shrink:0;border-right:1px solid var(--border);padding:16px;overflow-y:auto;display:flex;flex-direction:column;gap:12px}
.fl{display:flex;flex-direction:column;gap:4px}
.fl label{font-size:10px;color:var(--muted2);font-family:monospace;letter-spacing:.05em}
.fl input,.fl select,.fl textarea{background:var(--card);border:1px solid var(--border);color:var(--text);font-size:12px;padding:7px 9px;border-radius:6px;outline:none;font-family:inherit}
.fl input:focus,.fl select:focus,.fl textarea:focus{border-color:var(--accent)}
.fl textarea{resize:vertical}
.fl input::placeholder{color:var(--muted2)}
.rp-right{flex:1;display:flex;flex-direction:column;overflow:hidden}
.msg-tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0}
.mtab{flex:1;font-size:11px;font-family:monospace;padding:9px 6px;border:none;background:transparent;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent}
.mtab:hover{color:var(--text)}
.mtab.active{color:var(--accent);border-bottom-color:var(--accent);background:rgba(42,167,255,.04)}
.msg-body{flex:1;padding:16px;overflow-y:auto;display:flex;flex-direction:column;gap:10px}
.mf{display:flex;flex-direction:column;gap:4px}
.mf label{font-size:10px;color:var(--muted2);font-family:monospace;letter-spacing:.05em}
.mf input,.mf textarea{background:var(--card2);border:1px solid var(--border);color:var(--text);font-size:12px;padding:8px 10px;border-radius:6px;outline:none;font-family:inherit;line-height:1.6}
.mf input:focus,.mf textarea:focus{border-color:var(--accent)}
.mf input::placeholder,.mf textarea::placeholder{color:var(--muted2)}
.char-count{font-size:10px;font-family:monospace;text-align:right;margin-top:2px}
.msg-footer{padding:12px 16px;border-top:1px solid var(--border);display:flex;gap:8px;flex-shrink:0}
.btn-dm{flex:1;padding:9px;background:rgba(0,217,174,.1);border:1px solid rgba(0,217,174,.25);color:var(--accent2);font-size:12px;font-weight:700;font-family:monospace;border-radius:7px;cursor:pointer}
.btn-dm:hover{background:rgba(0,217,174,.2)}
.btn-email{flex:1;padding:9px;background:rgba(42,167,255,.1);border:1px solid rgba(42,167,255,.25);color:var(--accent);font-size:12px;font-weight:700;font-family:monospace;border-radius:7px;cursor:pointer}
.btn-email:hover{background:rgba(42,167,255,.2)}
.btn-save-c{padding:9px 14px;background:transparent;border:1px solid var(--border);color:var(--muted);font-size:12px;font-family:monospace;border-radius:7px;cursor:pointer}
.btn-save-c:hover{border-color:var(--accent3);color:var(--accent3)}
.detail{flex:1;overflow:hidden;display:flex;flex-direction:column}
.dh{padding:14px 18px 12px;border-bottom:1px solid var(--border);flex-shrink:0}
.dh-name{font-size:17px;font-weight:700;margin-bottom:2px}
.dh-co{font-size:12px;color:var(--muted);margin-bottom:8px}
.dh-meta{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.durl{font-size:11px;color:var(--accent);font-family:monospace;text-decoration:none}
.dbody{display:flex;flex:1;overflow:hidden}
.dleft{width:260px;flex-shrink:0;border-right:1px solid var(--border);padding:14px;overflow-y:auto;display:flex;flex-direction:column;gap:10px}
.log-list{display:flex;flex-direction:column;gap:4px}
.log-item{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:7px 9px}
.log-d{font-size:9px;color:var(--muted2);font-family:monospace;margin-bottom:2px}
.log-t{font-size:11px;color:var(--muted)}
.log-t.hot{color:var(--accent3)}.log-t.replied{color:var(--accent2)}.log-t.sent{color:var(--accent)}
.spinner{display:inline-block;width:13px;height:13px;border:2px solid rgba(0,217,174,.3);border-top-color:var(--accent2);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:18px;right:18px;padding:9px 14px;border-radius:8px;font-size:11px;font-family:monospace;z-index:999;transition:opacity .3s;pointer-events:none}
.toast.success{background:rgba(0,217,174,.15);border:1px solid rgba(0,217,174,.4);color:var(--accent2)}
.toast.error{background:rgba(255,71,87,.1);border:1px solid rgba(255,71,87,.3);color:var(--red)}
.toast.info{background:rgba(42,167,255,.12);border:1px solid rgba(42,167,255,.3);color:var(--accent)}
.mo{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:22px;width:100%;max-width:400px;display:flex;flex-direction:column;gap:12px}
.modal h3{font-size:14px;font-weight:700}
.mf2{display:flex;flex-direction:column;gap:4px}
.mf2 label{font-size:10px;color:var(--muted2);font-family:monospace;letter-spacing:.05em}
.mf2 input{background:var(--card2);border:1px solid var(--border);color:var(--text);font-size:12px;padding:7px 9px;border-radius:6px;outline:none;font-family:monospace}
.mf2 input:focus{border-color:var(--accent)}
.chi{font-size:10px;color:var(--muted2);margin-top:2px}
.ma{display:flex;gap:8px;justify-content:flex-end;margin-top:4px}
.bcn{padding:7px 14px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:12px;cursor:pointer}
.bco{padding:7px 14px;border-radius:6px;border:1px solid rgba(42,167,255,.35);background:rgba(42,167,255,.1);color:var(--accent);font-size:12px;font-weight:600;cursor:pointer}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">PersonaQuanta <span>·</span> CRM</div>
  <div class="topbar-meta">INVESTOR OUTREACH · 2026</div>
  <div class="topbar-right">
    <button class="tbtn" id="btn-cfg">⚙ Settings</button>
    <button class="tbtn primary" id="btn-new">+ New Contact</button>
  </div>
</div>

<div class="layout">
  <div class="sidebar">
    <div class="sidebar-stats">
      <div class="sstat"><div class="sstat-val" id="s-total" style="color:var(--text)">0</div><div class="sstat-lbl">TOTAL</div></div>
      <div class="sstat"><div class="sstat-val" id="s-hot" style="color:var(--accent3)">0</div><div class="sstat-lbl">HOT</div></div>
      <div class="sstat"><div class="sstat-val" id="s-replied" style="color:var(--accent2)">0</div><div class="sstat-lbl">REPLIED</div></div>
      <div class="sstat"><div class="sstat-val" id="s-fw" style="color:#8CA0FF">0</div><div class="sstat-lbl">FOLLOW-UP</div></div>
    </div>
    <div class="search-wrap"><input type="text" id="search" placeholder="Search..."></div>
    <div class="sidebar-filters">
      <button class="fb active" id="fb-all">All <span class="fc" id="fc-all"></span></button>
      <button class="fb" id="fb-hot">🔥 Hot <span class="fc" id="fc-hot"></span></button>
      <button class="fb" id="fb-sent">Sent <span class="fc" id="fc-sent"></span></button>
      <button class="fb" id="fb-replied">Replied <span class="fc" id="fc-replied"></span></button>
      <button class="fb" id="fb-followup">Follow-up <span class="fc" id="fc-followup"></span></button>
      <button class="fb" id="fb-declined">Declined <span class="fc" id="fc-declined"></span></button>
    </div>
    <div class="contact-list" id="clist"></div>
  </div>
  <div class="main" id="main">
    <div class="main-empty"><div class="ico">◈</div><p style="font-size:13px;margin-bottom:4px">Paste a LinkedIn profile to start</p><p style="font-size:11px">Click <b style="color:var(--accent2)">+ New Contact</b> above</p></div>
  </div>
</div>

<div class="mo" id="cfg-mo" style="display:none">
  <div class="modal">
    <h3>⚙ Settings</h3>
    <div class="mf2"><label>ANTHROPIC API KEY</label><input id="cfg-c" type="password" placeholder="sk-ant-..."><div class="chi">Analyzes profiles + generates messages</div></div>
    <div class="mf2"><label>RESEND API KEY</label><input id="cfg-r" type="password" placeholder="re_..."><div class="chi">Sends emails via hello@personaquanta.online</div></div>
    <div class="mf2"><label>FROM EMAIL</label><input id="cfg-f" placeholder="hello@personaquanta.online"></div>
    <div class="ma"><button class="bcn" id="cfg-cancel">Cancel</button><button class="bco" id="cfg-save">Save</button></div>
  </div>
</div>

<div class="toast" id="toast" style="opacity:0"></div>

<script>
var PROXY = 'https://pq-proxy.personaquanta.workers.dev';
var ST = {
  new:{l:'New',c:'b-new'},sent:{l:'Sent',c:'b-sent'},replied:{l:'Replied',c:'b-replied'},
  hot:{l:'🔥 Hot',c:'b-hot'},declined:{l:'Declined',c:'b-declined'},
  followup:{l:'Follow-up',c:'b-followup'},closed:{l:'Closed',c:'b-closed'}
};
var SEED = [
  {n:'Frank Tornatore',co:'cryptoventures.co.uk · CEO',st:'hot',em:'frank.tornatore@gmail.com',url:'',nt:'Deck sent 18 Mar',fit:91,dt:'2026-03-18',log:[{d:'2026-03-18',t:'Deck sent',s:'sent'}]},
  {n:'Bas Godska',co:'Acrobator Ventures · Founder',st:'sent',em:'',url:'',nt:'500+ deals, early Miro investor, NL4UA',fit:95,dt:'2026-03-18',log:[]},
  {n:'Katya Kohen',co:'Stifel Financial · MD Venture',st:'sent',em:'',url:'',nt:'',fit:92,dt:'2026-03-18',log:[]},
  {n:'Kirill Bondar PhD',co:'Ukraine Phoenix Tech Fund · Partner',st:'sent',em:'',url:'',nt:'Follow up in Ukrainian',fit:90,dt:'2026-03-18',log:[]},
  {n:'Miriam Erlich',co:'High House Investments · Head',st:'sent',em:'',url:'',nt:'',fit:89,dt:'2026-03-18',log:[]},
  {n:'Luka Tomljenovic',co:'Early-stage · Aerospace',st:'declined',em:'',url:'',nt:'Off-strategy',fit:34,dt:'2026-03-18',log:[{d:'2026-03-18',t:'Declined',s:'declined'}]},
  {n:'Kateryna TRYFONOVA',co:'Angel Investor · Impact',st:'declined',em:'',url:'',nt:'Fintech not her theme',fit:40,dt:'2026-03-18',log:[{d:'2026-03-18',t:'Declined',s:'declined'}]},
  {n:'Allan Rosen',co:'Investment Banker',st:'replied',em:'',url:'',nt:'Advised to target VCs',fit:35,dt:'2026-03-18',log:[{d:'2026-03-18',t:'Replied: target VCs',s:'replied'}]},
];

var contacts = [];
var activeFilter = 'all';
var selectedId = null;
var currentDraft = null;

function showToast(msg, type) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + (type||'success');
  t.style.opacity = '1';
  setTimeout(function(){ t.style.opacity = '0'; }, 3500);
}

function saveData() { localStorage.setItem('pq_crm6', JSON.stringify(contacts)); }
function loadData() {
  var s = localStorage.getItem('pq_crm6');
  if (s) {
    contacts = JSON.parse(s);
  } else {
    contacts = SEED.map(function(c, i) { return Object.assign({}, c, {id: Date.now()+i, log: c.log||[]}); });
  }
}

function getFiltered() {
  var q = document.getElementById('search').value.toLowerCase();
  return contacts.filter(function(c) {
    if (activeFilter !== 'all' && c.st !== activeFilter) return false;
    if (q && (c.n+c.co+c.nt+c.em).toLowerCase().indexOf(q) === -1) return false;
    return true;
  });
}

function updateStats() {
  document.getElementById('s-total').textContent = contacts.length;
  document.getElementById('s-hot').textContent = contacts.filter(function(c){return c.st==='hot'}).length;
  document.getElementById('s-replied').textContent = contacts.filter(function(c){return c.st==='replied'}).length;
  document.getElementById('s-fw').textContent = contacts.filter(function(c){return c.st==='followup'}).length;
  ['all','hot','sent','replied','followup','declined'].forEach(function(f) {
    var e = document.getElementById('fc-'+f);
    if (e) e.textContent = f==='all' ? contacts.length : contacts.filter(function(c){return c.st===f}).length;
  });
}

function renderList() {
  updateStats();
  var data = getFiltered();
  var html = data.map(function(c) {
    var s = ST[c.st] || ST.sent;
    return '<div class="ci'+(c.id===selectedId?' sel':'')+'" data-id="'+c.id+'">' +
      '<div class="ci-name">'+c.n+(c.fit?' <span style="font-size:9px;color:var(--muted2)">'+c.fit+'</span>':'')+'</div>' +
      '<div class="ci-co">'+(c.co||'—')+'</div>' +
      '<div class="ci-bot"><span class="badge '+s.c+'">'+s.l+'</span><span class="ci-date">'+(c.dt||'')+'</span></div>' +
      '</div>';
  }).join('');
  document.getElementById('clist').innerHTML = html;
  // Attach click events
  document.querySelectorAll('.ci').forEach(function(el) {
    el.addEventListener('click', function() {
      selContact(parseInt(el.getAttribute('data-id')));
    });
  });
}

function setFilter(f) {
  activeFilter = f;
  document.querySelectorAll('.fb').forEach(function(b){ b.classList.remove('active'); });
  var btn = document.getElementById('fb-'+f);
  if (btn) btn.classList.add('active');
  renderList();
}

function showPastePanel() {
  selectedId = null;
  renderList();
  document.getElementById('main').innerHTML =
    '<div class="paste-panel">' +
    '<div><div class="paste-title">+ New Contact</div>' +
    '<div class="paste-sub">Paste LinkedIn profile text — Claude extracts all info and generates DM + Email automatically</div></div>' +
    '<textarea class="paste-area" id="profile-paste" placeholder="Paste the full LinkedIn profile text here...\n\nInclude name, headline, about, experience, location.\n\nClaude will automatically:\n• Extract Name, Company, Role, Email\n• Score fit (0-100)\n• Generate LinkedIn DM (≤300 chars)\n• Generate cold Email"></textarea>' +
    '<button class="btn-analyze" id="btn-analyze"><span id="a-ico">✦</span> <span id="a-txt">Analyze Profile & Generate Messages</span></button>' +
    '<div class="analysis-note">⚡ Requires Anthropic API key in Settings. ~10 seconds.</div>' +
    '</div>';
  document.getElementById('btn-analyze').addEventListener('click', analyzeProfile);
}

async function analyzeProfile() {
  var ck = localStorage.getItem('pq_claude');
  if (!ck) { showToast('Add Anthropic API key in Settings first', 'error'); openConfig(); return; }
  var txt = document.getElementById('profile-paste').value.trim();
  if (txt.length < 50) { showToast('Paste more profile text', 'error'); return; }

  var btn = document.getElementById('btn-analyze');
  var ico = document.getElementById('a-ico');
  var atxt = document.getElementById('a-txt');
  btn.disabled = true;
  ico.className = 'spinner';
  atxt.textContent = 'Analyzing...';

  var prompt = 'You are an assistant for Maksym Pozhydaiev, founder of PersonaQuanta.\n\n' +
    'PRODUCT: PersonaQuanta — B2B engagement layer for fintech/insurance. 4 indices: NW, LEP, HPI, CONF. Reduces 30-day churn by 13%.\n' +
    'INVESTMENT: $32,000 · 20% revenue share until $48k (1.5× ROI) · then 10% permanently\n' +
    'Break-even: 24 sales × $9,900 at 3/mo ≈ 8 months. Solo+AI: $32k = $200k+ traditional team.\n' +
    'Founder: Ukrainian. Product ready.\n\n' +
    'LINKEDIN PROFILE:\n' + txt + '\n\n' +
    'TASKS:\n' +
    '1. Extract contact info from profile\n' +
    '2. Score investor fit 0-100 for PersonaQuanta\n' +
    '3. Write LinkedIn DM — STRICT MAX 300 characters total\n' +
    '4. Write cold email (subject + body, max 180 words)\n\n' +
    'FIT: 90-100=active angel/VC fintech; 70-89=angel/VC any tech; 50-69=entrepreneur with capital; below 50=indirect\n\n' +
    'DM RULES: max 300 chars, personal hook, end with "Should I send the brief?"\n\n' +
    'EMAIL RULES: personal hook first sentence, product+terms ($32k/20%/$48k/10%), end "Happy to send the materials if this fits your current focus.", sign Maksym Pozhydaiev Founder PersonaQuanta personaquanta@proton.me, no meeting CTA\n\n' +
    'Return ONLY valid JSON:\n' +
    '{"name":"","company":"","email":"","linkedin_url":"","fit":85,"fit_reason":"","angle":"","dm":"","dm_chars":0,"email_subject":"","email_body":""}';

  try {
    var res = await fetch(PROXY + '/claude', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({model:'claude-sonnet-4-20250514', max_tokens:1500, messages:[{role:'user', content:prompt}]})
    });
    var data = await res.json();
    var txt2 = data.content[0].text.trim();
    if (txt2.startsWith('```')) txt2 = txt2.replace(/```json?|```/g, '').trim();
    var p = JSON.parse(txt2);
    currentDraft = Object.assign({}, p, {profileText: txt});
    showResults(p);
  } catch(e) {
    showToast('Analysis failed: ' + e.message, 'error');
    btn.disabled = false;
    ico.className = '';
    ico.textContent = '✦';
    atxt.textContent = 'Analyze Profile & Generate Messages';
  }
}

function showResults(p) {
  var dmLen = p.dm ? p.dm.length : 0;
  var dmColor = dmLen <= 280 ? 'var(--accent2)' : dmLen <= 300 ? 'var(--accent3)' : 'var(--red)';
  document.getElementById('main').innerHTML =
    '<div class="results-panel">' +
    '<div class="rp-header">' +
    '<div><div class="rp-name">'+(p.name||'Unknown')+'</div>' +
    '<div class="rp-co">'+(p.company||'')+'</div>' +
    '<span class="rp-fit">Fit '+(p.fit||0)+'/100</span>' +
    (p.angle ? '<div style="font-size:11px;color:var(--muted);margin-top:4px">'+p.angle+'</div>' : '') +
    '</div>' +
    '<div class="rp-meta">' +
    '<button id="btn-back" style="background:none;border:1px solid var(--border);color:var(--muted);font-size:11px;font-family:monospace;padding:4px 10px;border-radius:5px;cursor:pointer">← New</button>' +
    '<button id="btn-save-contact" class="btn-save-c">Save to CRM</button>' +
    '</div></div>' +
    '<div style="padding:8px 20px;border-bottom:1px solid var(--border);font-size:11px;color:var(--muted2);flex-shrink:0">'+(p.fit_reason||'')+'</div>' +
    '<div class="rp-body">' +
    '<div class="rp-left">' +
    '<div class="fl"><label>NAME</label><input id="r-name" value="'+(p.name||'')+'"></div>' +
    '<div class="fl"><label>COMPANY / ROLE</label><input id="r-co" value="'+(p.company||'')+'"></div>' +
    '<div class="fl"><label>EMAIL</label><input id="r-email" value="'+(p.email||'')+'" placeholder="if found in profile"></div>' +
    '<div class="fl"><label>LINKEDIN URL</label><input id="r-url" value="'+(p.linkedin_url||'')+'" placeholder="https://linkedin.com/in/..."></div>' +
    '<div class="fl"><label>FIT SCORE</label><input type="number" id="r-fit" value="'+(p.fit||0)+'" min="0" max="100"></div>' +
    '<div class="fl"><label>NOTES</label><textarea id="r-notes" rows="3">'+(p.angle||'')+'</textarea></div>' +
    '<div class="fl"><label>STATUS</label><select id="r-status">' +
    Object.entries(ST).map(function(e){ return '<option value="'+e[0]+'">'+(e[0]==='new'?'New':e[1].l)+'</option>'; }).join('') +
    '</select></div>' +
    '</div>' +
    '<div class="rp-right">' +
    '<div class="msg-tabs">' +
    '<button class="mtab active" id="mt-dm">💬 LinkedIn DM</button>' +
    '<button class="mtab" id="mt-email">✉ Email</button>' +
    '</div>' +
    '<div id="msg-content" class="msg-body">' +
    '<div class="mf"><label>LINKEDIN DM <span style="font-size:9px;color:var(--muted2)">(MAX 300 CHARS)</span></label>' +
    '<textarea id="dm-text" rows="6">'+(p.dm||'')+'</textarea>' +
    '<div class="char-count" id="char-count" style="color:'+dmColor+'">'+dmLen+' / 300 characters</div></div>' +
    '<div style="font-size:11px;color:var(--muted2);padding:8px 10px;background:var(--card);border-radius:6px;border:1px solid var(--border)">💡 Copy and paste directly into LinkedIn messaging.</div>' +
    '</div>' +
    '<div class="msg-footer">' +
    '<button class="btn-dm" id="btn-copy-dm">📋 Copy DM</button>' +
    '<button class="btn-email" id="btn-send-email">✉ Send Email</button>' +
    '</div>' +
    '</div></div></div>';

  // Attach all events after render
  document.getElementById('btn-back').addEventListener('click', showPastePanel);
  document.getElementById('btn-save-contact').addEventListener('click', function(){ saveContactFn(); });
  document.getElementById('dm-text').addEventListener('input', updateCharCount);
  document.getElementById('btn-copy-dm').addEventListener('click', copyDM);
  document.getElementById('btn-send-email').addEventListener('click', handleSendEmail);
  document.getElementById('mt-dm').addEventListener('click', function(){ switchMsgTab('dm'); });
  document.getElementById('mt-email').addEventListener('click', function(){ switchMsgTab('email'); });
}

function updateCharCount() {
  var ta = document.getElementById('dm-text');
  var cc = document.getElementById('char-count');
  if (!ta || !cc) return;
  var len = ta.value.length;
  cc.textContent = len + ' / 300 characters';
  cc.style.color = len <= 280 ? 'var(--accent2)' : len <= 300 ? 'var(--accent3)' : 'var(--red)';
}

function switchMsgTab(tab) {
  var d = currentDraft || {};
  document.getElementById('mt-dm').classList.toggle('active', tab==='dm');
  document.getElementById('mt-email').classList.toggle('active', tab==='email');
  var mc = document.getElementById('msg-content');
  var bDM = document.getElementById('btn-copy-dm');
  var bEmail = document.getElementById('btn-send-email');
  if (!mc) return;
  if (tab === 'dm') {
    var dmLen = (d.dm||'').length;
    var col = dmLen<=280?'var(--accent2)':dmLen<=300?'var(--accent3)':'var(--red)';
    mc.innerHTML = '<div class="mf"><label>LINKEDIN DM <span style="font-size:9px;color:var(--muted2)">(MAX 300 CHARS)</span></label>' +
      '<textarea id="dm-text" rows="6">'+(d.dm||'')+'</textarea>' +
      '<div class="char-count" id="char-count" style="color:'+col+'">'+dmLen+' / 300 characters</div></div>' +
      '<div style="font-size:11px;color:var(--muted2);padding:8px 10px;background:var(--card);border-radius:6px;border:1px solid var(--border)">💡 Copy and paste directly into LinkedIn messaging.</div>';
    document.getElementById('dm-text').addEventListener('input', updateCharCount);
    if (bDM) { bDM.textContent = '📋 Copy DM'; bDM.onclick = copyDM; }
  } else {
    mc.innerHTML = '<div class="mf"><label>TO</label><input id="email-to" value="'+(d.email||'')+'" placeholder="recipient@email.com"></div>' +
      '<div class="mf"><label>SUBJECT</label><input id="email-subj" value="'+(d.email_subject||'')+'"></div>' +
      '<div class="mf"><label>BODY</label><textarea id="email-body" rows="12" style="min-height:180px">'+(d.email_body||'')+'</textarea></div>';
    if (bDM) { bDM.textContent = '📋 Copy Email'; bDM.onclick = function(){ var b=document.getElementById('email-body'); if(b){navigator.clipboard.writeText(b.value); showToast('Copied ✓','success');} }; }
  }
}

function copyDM() {
  var ta = document.getElementById('dm-text');
  if (!ta) return;
  if (ta.value.length > 300) { showToast('DM is '+ta.value.length+' chars — trim to 300 first', 'error'); return; }
  navigator.clipboard.writeText(ta.value).then(function(){ showToast('DM copied ✓', 'success'); if(currentDraft) currentDraft._dmSent=true; });
}

function handleSendEmail() {
  var emailTab = document.getElementById('mt-email');
  if (!emailTab || !emailTab.classList.contains('active')) { switchMsgTab('email'); showToast('Fill in To and click Send Email again', 'info'); return; }
  sendEmailFn();
}

async function sendEmailFn() {
  var rk = localStorage.getItem('pq_resend');
  if (!rk) { showToast('Add Resend API key in Settings', 'error'); openConfig(); return; }
  var to = (document.getElementById('email-to')||{}).value||'';
  var subj = (document.getElementById('email-subj')||{}).value||'';
  var body = (document.getElementById('email-body')||{}).value||'';
  var from = localStorage.getItem('pq_from') || 'hello@personaquanta.online';
  to = to.trim(); subj = subj.trim(); body = body.trim();
  if (!to) { showToast('Add recipient email', 'error'); return; }
  if (!subj || !body) { showToast('Fill in subject and body', 'error'); return; }
  var btn = document.getElementById('btn-send-email');
  if (btn) { btn.disabled = true; btn.textContent = 'Sending...'; }
  try {
    var res = await fetch(PROXY + '/send-email', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({from: 'Maksym Pozhydaiev <'+from+'>', to:[to], subject:subj, text:body})
    });
    var data = await res.json();
    if (data.id) {
      showToast('Email sent ✓', 'success');
      if (currentDraft) { currentDraft._emailSent = true; currentDraft.email = to; }
      saveContactFn('sent');
    } else {
      showToast('Failed: ' + (data.message||JSON.stringify(data)), 'error');
    }
  } catch(e) {
    showToast('Error: ' + e.message, 'error');
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = '✉ Send Email'; }
  }
}

function saveContactFn(forceStatus) {
  if (!currentDraft) { showToast('No contact to save', 'error'); return; }
  var status = forceStatus || (document.getElementById('r-status')||{}).value || 'new';
  var c = {
    id: Date.now(),
    n: (document.getElementById('r-name')||{}).value || currentDraft.name || 'Unknown',
    co: (document.getElementById('r-co')||{}).value || currentDraft.company || '',
    em: (document.getElementById('r-email')||{}).value || currentDraft.email || '',
    url: (document.getElementById('r-url')||{}).value || currentDraft.linkedin_url || '',
    fit: parseInt((document.getElementById('r-fit')||{}).value) || currentDraft.fit || 0,
    nt: (document.getElementById('r-notes')||{}).value || currentDraft.angle || '',
    st: status,
    dt: new Date().toISOString().slice(0,10),
    log: [{d: new Date().toISOString().slice(0,10), t:'Contact added · '+ST[status].l, s:status}],
    ptxt: currentDraft.profileText || '',
  };
  if (currentDraft._dmSent) c.log.push({d:c.dt, t:'LinkedIn DM copied and sent', s:'sent'});
  if (currentDraft._emailSent) c.log.push({d:c.dt, t:'Email sent: "'+currentDraft.email_subject+'"', s:'sent'});
  contacts.unshift(c);
  saveData(); renderList();
  selectedId = c.id;
  currentDraft = null;
  selContact(c.id);
  showToast('Saved ✓', 'success');
}

function selContact(id) {
  selectedId = id;
  renderList();
  var c = contacts.find(function(x){ return x.id===id; });
  if (!c) return;
  var s = ST[c.st] || ST.sent;
  document.getElementById('main').innerHTML =
    '<div class="detail">' +
    '<div class="dh">' +
    '<div class="dh-name">'+c.n+(c.fit?' <span style="font-size:12px;color:var(--muted2);font-weight:400">· '+c.fit+'/100</span>':'')+'</div>' +
    '<div class="dh-co">'+(c.co||'—')+'</div>' +
    '<div class="dh-meta">' +
    '<span class="badge '+s.c+'">'+s.l+'</span>' +
    (c.url?'<a class="durl" href="'+c.url+'" target="_blank">LinkedIn ↗</a>':'') +
    (c.em?'<span class="durl">'+c.em+'</span>':'') +
    '<span style="font-size:10px;color:var(--muted2);font-family:monospace">'+(c.dt||'')+'</span>' +
    '<button id="btn-del-c" style="margin-left:auto;background:none;border:none;color:var(--muted2);cursor:pointer;font-size:11px;font-family:monospace">× Delete</button>' +
    '</div></div>' +
    '<div class="dbody">' +
    '<div class="dleft">' +
    '<div class="fl"><label>STATUS</label>' +
    '<select id="detail-status">'+Object.entries(ST).map(function(e){return '<option value="'+e[0]+'"'+(c.st===e[0]?' selected':'')+'>'+e[1].l+'</option>';}).join('')+'</select>' +
    '</div>' +
    '<div class="fl"><label>EMAIL</label><input id="detail-email" value="'+(c.em||'')+'" placeholder="email"></div>' +
    '<div class="fl"><label>NOTES</label><textarea id="detail-notes" rows="3">'+(c.nt||'')+'</textarea></div>' +
    '<div class="fl"><label>ACTIVITY LOG</label>' +
    '<div class="log-list">' +
    ((c.log||[]).length ? (c.log||[]).slice().reverse().map(function(l){return '<div class="log-item"><div class="log-d">'+l.d+'</div><div class="log-t '+(l.s||'')+'">'+l.t+'</div></div>';}).join('') : '<div style="font-size:11px;color:var(--muted2)">No activity</div>') +
    '</div></div>' +
    (c.ptxt ? '<button id="btn-regen" style="padding:7px 12px;border-radius:6px;border:1px solid rgba(0,217,174,.3);background:rgba(0,217,174,.08);color:var(--accent2);font-size:11px;font-family:monospace;cursor:pointer">↺ Regenerate messages</button>' : '') +
    '</div>' +
    '<div style="flex:1;display:flex;align-items:center;justify-content:center;color:var(--muted2);flex-direction:column;gap:8px"><div style="font-size:24px;opacity:.2">◈</div><p style="font-size:12px">Use <b style="color:var(--accent2)">+ New Contact</b> to generate new messages</p></div>' +
    '</div></div>';

  document.getElementById('btn-del-c').addEventListener('click', function(){ delContact(id); });
  document.getElementById('detail-status').addEventListener('change', function(){ updateContact(id,'st',this.value); });
  document.getElementById('detail-email').addEventListener('change', function(){ updateContact(id,'em',this.value); });
  document.getElementById('detail-notes').addEventListener('change', function(){ updateContact(id,'nt',this.value); });
  if (c.ptxt) {
    document.getElementById('btn-regen').addEventListener('click', function(){
      showPastePanel();
      setTimeout(function(){ var ta=document.getElementById('profile-paste'); if(ta){ta.value=c.ptxt; analyzeProfile();} }, 100);
    });
  }
}

function updateContact(id, field, val) {
  var c = contacts.find(function(x){ return x.id===id; });
  if (!c) return;
  c[field] = val;
  if (field === 'st') {
    if (!c.log) c.log = [];
    c.log.push({d: new Date().toISOString().slice(0,10), t:'Status → '+(ST[val]||{l:val}).l, s:val});
    renderList(); updateStats();
  }
  saveData();
}

function delContact(id) {
  if (!confirm('Delete this contact?')) return;
  contacts = contacts.filter(function(c){ return c.id!==id; });
  selectedId = null;
  document.getElementById('main').innerHTML = '<div class="main-empty"><div class="ico">◈</div><p style="font-size:13px">Select a contact</p></div>';
  saveData(); renderList();
}

function openConfig() {
  document.getElementById('cfg-c').value = localStorage.getItem('pq_claude')||'';
  document.getElementById('cfg-r').value = localStorage.getItem('pq_resend')||'';
  document.getElementById('cfg-f').value = localStorage.getItem('pq_from')||'hello@personaquanta.online';
  document.getElementById('cfg-mo').style.display = 'flex';
}

// Init — attach all static events
document.addEventListener('DOMContentLoaded', function() {
  document.getElementById('btn-cfg').addEventListener('click', openConfig);
  document.getElementById('btn-new').addEventListener('click', showPastePanel);
  document.getElementById('cfg-cancel').addEventListener('click', function(){ document.getElementById('cfg-mo').style.display='none'; });
  document.getElementById('cfg-save').addEventListener('click', function(){
    localStorage.setItem('pq_claude', document.getElementById('cfg-c').value.trim());
    localStorage.setItem('pq_resend', document.getElementById('cfg-r').value.trim());
    localStorage.setItem('pq_from', document.getElementById('cfg-f').value.trim());
    document.getElementById('cfg-mo').style.display='none';
    showToast('Saved ✓', 'success');
  });
  document.getElementById('search').addEventListener('input', renderList);
  document.getElementById('fb-all').addEventListener('click', function(){ setFilter('all'); });
  document.getElementById('fb-hot').addEventListener('click', function(){ setFilter('hot'); });
  document.getElementById('fb-sent').addEventListener('click', function(){ setFilter('sent'); });
  document.getElementById('fb-replied').addEventListener('click', function(){ setFilter('replied'); });
  document.getElementById('fb-followup').addEventListener('click', function(){ setFilter('followup'); });
  document.getElementById('fb-declined').addEventListener('click', function(){ setFilter('declined'); });
  document.addEventListener('keydown', function(e){ if(e.key==='Escape') document.getElementById('cfg-mo').style.display='none'; });

  loadData();
  renderList();
});
</script>
</body>
</html>
